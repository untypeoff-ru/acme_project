{% extends "base.html" %}

{% block content %}
  {% for birthday in birthdays %}
    <div class="row">
      <div class="col-2">
        {% if birthday.image %}
          <img src="{{ birthday.image.url }}" height="100">
        {% endif %}
      </div>

      <div class="col-10">
        {{ birthday.first_name }} {{ birthday.last_name }} - {{ birthday.birthday }}
      </div>
      <div>
        <a href="{% url 'birthday:edit' birthday.id %}">Редактировать</a> | 
        <a href="{% url 'birthday:delete' birthday.id %}">Удалить</a>
      {% if not forloop.last %}
        <hr class="mt-3">
      {% endif %}
    </div>
  {% endfor %}
{% endblock %}
